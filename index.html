<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aqua Blitz</title>
<!-- Load external config if served from a server; inline fallback covers direct file:// open -->
<script src="config.js" onerror="window.__configFailed=true"></script>
<script>
// Inline fallback — mirrors config.js exactly.
// Only activates if config.js failed to load (e.g. opening index.html directly in Chrome).
if (typeof GAME_CONFIG === 'undefined') {
  window.GAME_CONFIG = {
    bucket: {
      height: 150, widthRatio: 0.23, bottomOffset: 130,
      movementLerp: 0.45, touchSpeedScale: 1.65, keyboardStepRatio: 0.12
    },
    physics: {
      catchTopThreshold: 12, catchBottomThreshold: 36,
      edgeWidthPercent: 0.10, edgeHeightThreshold: 18
    },
    drops: {
      baseInterval: 1400, minInterval: 700,
      baseSpeed: 3.5, maxSpeed: 7.5,
      speedDifficultyStep: 0.18, intervalDifficultyStep: 40,
      difficultyTimeStep: 30000,
      radiusMin: 10, radiusMax: 15, scatterVariance: 1.2
    },
    powerups: {
      timeStopFreezeDuration: 2000, maxConsumableStock: 5,
      basePrice: 160, reinforcedRimPrice: 15
    },
    particles: {
      catchCount: 16, edgeExplosionCount: 18, missCount: 8,
      catchColor: "rgba(56, 189, 248, ", missColor: "rgba(239, 68, 68, "
    },
    upgradeTiers: [
      { level:1, cost:100, slowDuration:6000, desc:"Increases lingering slomo window from 5s to 6s" },
      { level:2, cost:250, slowDuration:7000, desc:"Increases lingering slomo window from 6s to 7s" },
      { level:3, cost:500, slowDuration:8000, desc:"Increases lingering slomo window from 7s to 8s" },
      { level:4, cost:1000,slowDuration:9000, desc:"Increases lingering slomo window from 8s to 9s" }
    ]
  };
}
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#0a1628;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; height:-webkit-fill-available;
  font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  overflow:hidden; touch-action:none; position:fixed; width:100%;
}

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 20px;
  padding-top:max(env(safe-area-inset-top),14px);
  background:rgba(10,22,40,0.92); z-index:10;
  border-bottom:1px solid rgba(100,180,255,0.15);
  backdrop-filter:blur(8px);
}
.hud-item { display:flex; flex-direction:column; align-items:center; }
.hud-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(160,210,255,0.6); font-weight:500; }
.hud-value { font-size:22px; font-weight:700; color:#fff; line-height:1.1; }
.hud-pesos-wrapper { display:flex; align-items:center; gap:4px; }
.hud-pesos-icon { width:18px; height:18px; object-fit:contain; }
.hud-value.pesos { color:#ffd700; }
.hud-lives-display { display:flex; align-items:center; gap:5px; margin-top:2px; }
.hud-lives-count { font-size:18px; font-weight:800; color:#ff6b6b; }
.hud-lives-label { font-size:10px; color:rgba(255,107,107,0.7); text-transform:uppercase; letter-spacing:1px; }
/* Timer in HUD center */
#hud-timer { font-size:14px; font-weight:700; color:rgba(160,210,255,0.85); letter-spacing:0.5px; margin-top:1px; }

/* ── POWERUP SIDEBAR ── */
#powerup-container {
  position:fixed;
  top:max(env(safe-area-inset-top),86px);
  right:14px;
  z-index:15;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.powerup-btn {
  width:64px; height:64px;
  background:rgba(10,22,40,0.92);
  border:2.5px solid #4fc3f7;
  border-radius:18px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,0.5);
  position:relative;
  transition:transform 0.1s;
  gap:2px;
}
.powerup-btn:active { transform:scale(0.9); }
.powerup-btn.disabled { border-color:rgba(160,210,255,0.15); opacity:0.35; cursor:not-allowed; }
.powerup-btn .pw-icon { font-size:26px; line-height:1; }
.powerup-btn .pw-img { width:34px; height:34px; object-fit:contain; }
.powerup-count {
  position:absolute; bottom:-4px; right:-4px;
  background:#ff9800; color:#fff;
  font-size:11px; font-weight:800;
  padding:2px 7px; border-radius:10px;
  border:2px solid #0a1628;
  box-shadow:0 2px 6px rgba(0,0,0,0.4);
}
.powerup-label {
  font-size:8px; font-weight:700; letter-spacing:0.5px;
  text-transform:uppercase; color:rgba(160,210,255,0.55);
  line-height:1;
}
.powerup-btn.active-pulse {
  border-color:#ffd700;
  animation:pulseGlow 0.6s infinite alternate;
}
.powerup-btn.magnet-active { border-color:#a78bfa; animation:magnetGlow 0.5s infinite alternate; }
@keyframes pulseGlow {
  0% { box-shadow:0 0 4px rgba(255,215,0,0.4); }
  100% { box-shadow:0 0 22px rgba(255,215,0,0.9); }
}
@keyframes magnetGlow {
  0% { box-shadow:0 0 4px rgba(167,139,250,0.4); }
  100% { box-shadow:0 0 22px rgba(167,139,250,0.9); }
}

canvas { display:block; touch-action:none; }

/* ── SCREENS ── */
.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:20; padding:24px;
  padding-bottom:max(env(safe-area-inset-bottom),24px);
  background:rgba(8,16,28,0.97);
}
.screen.hidden { display:none; }

/* ── MAIN MENU ── */
.menu-title { font-size:48px; font-weight:800; color:#fff; text-align:center; line-height:1.0; margin-bottom:8px; letter-spacing:-1px; }
.menu-title .accent { color:#4fc3f7; }
.menu-sub { font-size:14px; color:rgba(160,210,255,0.6); text-align:center; margin-bottom:32px; line-height:1.6; max-width:260px; }
.menu-pesos-badge {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,215,0,0.08); border:1px solid rgba(255,215,0,0.2);
  border-radius:12px; padding:10px 18px; margin-bottom:28px;
}
.menu-pesos-badge img { width:22px; height:22px; object-fit:contain; }
.menu-pesos-badge span { font-size:15px; color:#ffd700; font-weight:700; }
.menu-pesos-badge .pesos-label { font-size:11px; color:rgba(255,215,0,0.6); font-weight:500; margin-left:2px; }

/* ── BUTTONS ── */
.btn-primary {
  background:linear-gradient(135deg,#4fc3f7,#0288d1);
  border:none; border-radius:50px; padding:16px 52px;
  font-size:18px; font-weight:700; color:#fff; cursor:pointer;
  -webkit-user-select:none; user-select:none; min-height:54px; width:220px;
  text-align:center; box-shadow:0 4px 14px rgba(2,136,209,0.4);
}
.btn-shop {
  background:transparent; border:none; padding:0; cursor:pointer; margin-top:16px;
  height:44px; width:220px; display:flex; align-items:center; justify-content:center;
  -webkit-user-select:none; user-select:none;
}
.btn-shop img { width:100%; height:100%; object-fit:fill; border-radius:4px; }
.btn-secondary {
  background:transparent; border:1.5px solid rgba(100,180,255,0.3);

}
.drops-tip { margin-top:20px; font-size:12px; color:rgba(160,210,255,0.38); text-align:center; line-height:1.5; }

/* ── CREDIT ── */
.credit { margin-top:24px; display:flex; align-items:center; gap:4px; }
.credit-text { font-size:12px; color:rgba(160,210,255,0.35); margin-right:5px; }
.letter-o { font-size:20px; font-weight:800; color:#4fc3f7; font-style:italic; text-shadow:0 0 10px rgba(79,195,247,0.5); }
.credit-amp { font-size:13px; color:rgba(160,210,255,0.35); margin:0 2px; }
.letter-s { font-size:22px; font-weight:900; background:linear-gradient(135deg,#ffd700,#ff9800); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-style:italic; filter:drop-shadow(0 0 5px rgba(255,200,0,0.4)); }

/* ── GAME OVER ── */
.gameover-title { font-size:40px; font-weight:800; color:#fff; text-align:center; margin-bottom:8px; }
.gameover-sub { font-size:14px; color:rgba(160,210,255,0.65); text-align:center; margin-bottom:20px; line-height:1.6; max-width:270px; }
.stat-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; justify-content:center; }
.stat-box {

.stat-box-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:rgba(160,210,255,0.55); margin-bottom:3px; }
.stat-box-value { font-size:26px; font-weight:700; color:#fff; }
.stat-box-value.gold { color:#ffd700; }
.stat-box-icon { display:flex; align-items:center; gap:5px; }
.stat-box-icon img { width:18px; height:18px; object-fit:contain; }

/* ── SHOP ── */
.shop-header { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:360px; margin-bottom:16px; }
.shop-title { font-size:26px; font-weight:800; color:#fff; }
.shop-balance { display:flex; align-items:center; gap:6px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.2); border-radius:20px; padding:6px 14px; }

.shop-item { display:flex; align-items:center; gap:12px; background:rgba(10,22,40,0.88); border:1px solid rgba(100,180,255,0.15); border-radius:14px; padding:12px 14px; }
.shop-item.owned { border-color:rgba(79,195,247,0.4); }
.shop-item-icon { width:50px; height:50px; border-radius:10px; background:rgba(79,195,247,0.1); border:1px solid rgba(79,195,247,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; font-size:28px; }
.shop-item-icon img { width:42px; height:42px; object-fit:contain; }
.shop-item-info { flex:1; min-width:0; }
.shop-item-name { font-size:14px; font-weight:700; color:#fff; margin-bottom:2px; }
.shop-item-desc { font-size:11px; color:rgba(160,210,255,0.6); line-height:1.4; }

.btn-buy { display:flex; align-items:center; gap:4px; background:linear-gradient(135deg,#ffd700,#f59e00); border:none; border-radius:18px; padding:7px 12px; font-size:12px; font-weight:700; color:#3a2000; cursor:pointer; -webkit-user-select:none; user-select:none; white-space:nowrap; }
.btn-buy img { width:13px; height:13px; object-fit:contain; }

.btn-owned { background:rgba(79,195,247,0.12); border:1px solid rgba(79,195,247,0.3); border-radius:18px; padding:7px 12px; font-size:12px; font-weight:700; color:#4fc3f7; white-space:nowrap; }
.upgrade-badge { display:inline-flex; align-items:center; gap:3px; background:rgba(255,215,0,0.15); border:1px solid rgba(255,215,0,0.3); border-radius:6px; padding:2px 6px; font-size:10px; color:#ffd700; margin-bottom:3px; font-weight:600; }

/* ── COMBO ── */
#combo-popup { position:fixed; top:90px; left:50%; transform:translateX(-50%); font-size:22px; font-weight:800; color:#ffd700; z-index:15; pointer-events:none; opacity:0; transition:opacity 0.3s; white-space:nowrap; }

/* ── TIER BANNER ── */
#tier-banner {
  position:fixed; top:80px; left:50%; transform:translateX(-50%);

  border-radius:20px; padding:6px 18px;
  font-size:13px; font-weight:700; color:#fff;
  z-index:14; pointer-events:none; opacity:0;
  transition:opacity 0.4s; white-space:nowrap;
}

/* ── MAGNET TIMER BAR ── */
#magnet-bar-wrap {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);

#magnet-bar-bg { width:100%; height:6px; background:rgba(167,139,250,0.15); border-radius:4px; overflow:hidden; }
#magnet-bar-fill { height:100%; background:linear-gradient(90deg,#a78bfa,#7c3aed); border-radius:4px; transition:width 0.1s linear; }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-item">
    <span class="hud-label">Score</span>

  <div class="menu-sub">Catch falling water drops to earn <strong style="color:#ffd700">pesos</strong>. Don't miss 3!</div>

<script>
/* ════════════════════════════════════════════
   SAVE SYSTEM — CrazyGames SDK + localStorage fallback
   ════════════════════════════════════════════ */
const SAVE_KEY = 'dropcatch_save_v2';
const isCrazyGames = window.location.hostname.includes('crazygames.com')
  || typeof window.CrazyGames !== 'undefined'
  || (typeof window.SDK !== 'undefined' && window.SDK?.data);
let cgSDK = null;

async function cgInit() {
  if (!isCrazyGames) return;
  try {
    if (typeof window.CrazyGames !== 'undefined' && window.CrazyGames.SDK) {
      cgSDK = window.CrazyGames.SDK;
      await cgSDK.init();
    }
  } catch(e) { cgSDK = null; }
}

async function saveProgress(data) {
  const payload = JSON.stringify(data);
  if (cgSDK) { try { await cgSDK.data.setItem(SAVE_KEY, payload); return; } catch(e) {} }
  try { localStorage.setItem(SAVE_KEY, payload); } catch(e) {}
}

async function loadProgress() {
  if (cgSDK) { try { const v = await cgSDK.data.getItem(SAVE_KEY); if (v) return JSON.parse(v); } catch(e) {} }
  try { const v = localStorage.getItem(SAVE_KEY); if (v) return JSON.parse(v); } catch(e) {}
  return null;
}

/* ════════════════════════════════════════════
   AUDIO
   ════════════════════════════════════════════ */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioBuffer = null;

async function preloadAudio() {
  try {
    const r = await fetch('timestop.mp3');
    const ab = await r.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(ab);
  } catch(e) {}
}

function _playSynth(freq1, freq2, dur, vol) {
  // Always synth — never touches audioBuffer
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq2, audioCtx.currentTime + dur);
    gain.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playAudioSynth(freq1, freq2, dur) {
  // Used ONLY for time stop — tries the loaded MP3 first, falls back to synth
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (audioBuffer) {
      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer; src.connect(audioCtx.destination); src.start(0); return;
    }
    _playSynth(freq1, freq2, dur);
  } catch(e) {}
}

/* ════════════════════════════════════════════
   PERSIST STATE
   ════════════════════════════════════════════ */
let persist = {
  totalPesos: 0,
  purchases: [],
  timestopCount: 0,
  timestopLevel: 0,
  magnetCount: 0,
  hasLifeRefill: false,
};

   tier 0 = water (blue)     — always, 1 peso

   golden = rare bonus       — once per 8min avg, 3x current tier reward
   ════════════════════════════════════════════ */
const TIER_CONFIG = [
  { name:'Water',   pesos:1,  color0:'rgba(180,230,255,0.95)', color1:'rgba(79,195,247,0.92)', color2:'rgba(2,136,209,0.88)',     shine:'rgba(255,255,255,0.65)' },
  { name:'Silver',  pesos:3,  color0:'rgba(220,225,235,0.95)', color1:'rgba(170,185,205,0.92)', color2:'rgba(100,115,135,0.88)',  shine:'rgba(255,255,255,0.8)' },
  { name:'Crystal', pesos:6,  color0:'rgba(200,255,240,0.95)', color1:'rgba(130,255,220,0.92)', color2:'rgba(30,200,180,0.88)',  shine:'rgba(255,255,255,0.9)' },
  { name:'Rainbow', pesos:15, color0:null, color1:null, color2:null, shine:'rgba(255,255,255,0.9)' },
];

const GOLDEN_MULTIPLIER = 3;

/* ════════════════════════════════════════════
   GAME STATE
   ════════════════════════════════════════════ */
let lives = 3, MAX_LIVES = 3, score = 0, sessionPesos = 0, combo = 0;
let dropInterval = 1400, dropTimer = 0, dropSpeed = 3.5, speedTick = 0, waterLevel = 0;
let gameRunning = false, animFrame, lastTime = 0;
let playTimeMs = 0; // milliseconds played this session

// Timestop
let timeStopActive = false;
let timeStopTimeRemaining = 0;
let postTimeStopSlowTimer = 0;
let postTimeStopSlowDuration = 5000; // tracks actual slow window for ramp calc
const POST_SLOW_SCALE = 0.22; // drop speed during slow-down phase
const POST_SLOW_CATCHUP_RATE = 0.08; // per drop per frame: ramp back up gently

// Magnet
let magnetActive = false;
let magnetTimeRemaining = 0;
const MAGNET_DURATION = 10000; // 10 seconds
const MAGNET_PULL_RADIUS = 999; // pulls all drops on screen
const MAGNET_PULL_FORCE = 0.055; // fraction of distance per frame

// Drop tier tracking
let currentMaxTier = 0; // highest tier that can currently spawn
let tierUnlockShown = 0; // avoid showing same tier banner twice
let goldenTimer = 0; // ms since last golden drop
const GOLDEN_INTERVAL_MS = 8 * 60 * 1000; // 8 minutes on average
const GOLDEN_VARIANCE = 0.4; // ± 40%
let nextGoldenAt = _randomGoldenInterval();

function _randomGoldenInterval() {
  return GOLDEN_INTERVAL_MS * (1 - GOLDEN_VARIANCE + Math.random() * GOLDEN_VARIANCE * 2);
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
let bucket = { x:0, y:0, w:0, h: GAME_CONFIG.bucket.height, targetX:0 };
let drops = [], particles = [];

const textures = {};
function loadImg(key, src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => { textures[key] = img; resolve(img); };
    img.onerror = () => { textures[key] = null; resolve(null); };
    img.src = src;
  });
}

/* ════════════════════════════════════════════
   SPAWN DROP
   ════════════════════════════════════════════ */
function pickDropTier() {
  // golden: rare random
  goldenTimer += dropInterval; // approximate — we check per spawn
  if (goldenTimer >= nextGoldenAt) {
    goldenTimer = 0; nextGoldenAt = _randomGoldenInterval();
    return 'golden';
  }
  if (currentMaxTier === 0) return 0;
  // Weight: higher tiers are rarer
  const weights = [60, 25, 12, 8]; // water, silver, crystal, rainbow
  const pool = weights.slice(0, currentMaxTier + 1);
  const total = pool.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) { r -= pool[i]; if (r <= 0) return i; }
  return 0;
}

function spawnDrop() {
  const rMin = GAME_CONFIG.drops.radiusMin;
  const rMax = GAME_CONFIG.drops.radiusMax;
  const scatter = GAME_CONFIG.drops.scatterVariance;
  const tier = pickDropTier();
  const MIN_GAP = 80; // minimum horizontal pixels between any two drops
  const MAX_TRIES = 12;
  let x;
  for (let attempt = 0; attempt < MAX_TRIES; attempt++) {
    x = Math.random() * (W - 64) + 32;
    // Check against every existing drop that's still near the top (y < 200)
    const tooClose = drops.some(d => d.y < 200 && Math.abs(d.x - x) < MIN_GAP);
    if (!tooClose) break;
    // On final attempt just place it — better than infinite loop
  }
  drops.push({
    x,
    y: -30,
    r: rMin + Math.random() * (rMax - rMin),
    speed: dropSpeed + Math.random() * 1.2,
    wobble: Math.random() * Math.PI * 2,
    scatterOffset: (Math.random() - 0.5) * scatter,
    tier,
    rainbowHue: Math.random() * 360,
    frozenAt: null,
    postSlowHandled: false,
  });
}

/* ════════════════════════════════════════════
   DRAW DROP
   ════════════════════════════════════════════ */
function drawDrop(d) {
  ctx.save();
  const {x, y, r, tier} = d;
  ctx.beginPath();
  ctx.moveTo(x, y - r * 1.6);
  ctx.bezierCurveTo(x+r*0.6, y-r*0.6, x+r, y+r*0.4, x, y+r);
  ctx.bezierCurveTo(x-r, y+r*0.4, x-r*0.6, y-r*0.6, x, y-r*1.6);
  ctx.closePath();

  const g = ctx.createLinearGradient(x-r, y-r, x+r, y+r);

  if (timeStopActive) {
    g.addColorStop(0, '#93c5fd'); g.addColorStop(1, '#1e3a8a');
  } else if (tier === 'golden') {
    g.addColorStop(0, 'rgba(255,240,100,0.98)');
    g.addColorStop(0.5, 'rgba(255,200,0,0.95)');
    g.addColorStop(1, 'rgba(200,140,0,0.90)');
  } else if (tier === 3) {
    // Rainbow: hue-rotate over time
    const hue = (d.rainbowHue + Date.now() * 0.1) % 360;
    g.addColorStop(0, `hsla(${hue},100%,80%,0.97)`);
    g.addColorStop(0.5, `hsla(${(hue+120)%360},100%,60%,0.94)`);
    g.addColorStop(1, `hsla(${(hue+240)%360},100%,45%,0.90)`);
  } else {
    const tc = TIER_CONFIG[tier];
    g.addColorStop(0, tc.color0);
    g.addColorStop(0.45, tc.color1);
    g.addColorStop(1, tc.color2);
  }

  ctx.fillStyle = g; ctx.fill();

  // shine
  ctx.beginPath();
  ctx.ellipse(x-r*0.28, y-r*0.5, r*0.22, r*0.36, -0.4, 0, Math.PI*2);
  const tc = (tier === 'golden' || tier === 3) ? 'rgba(255,255,255,0.85)' : (TIER_CONFIG[tier]||TIER_CONFIG[0]).shine;
  ctx.fillStyle = tc; ctx.fill();

  // golden sparkle ring
  if (tier === 'golden') {
    ctx.beginPath();
    ctx.arc(x, y, r + 3 + Math.sin(Date.now()/200)*2, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,220,0,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  }
  ctx.restore();
}

/* ════════════════════════════════════════════
   DRAW BUCKET
   ════════════════════════════════════════════ */
function drawBucket() {
  const {x:bx, y:by, w:bw, h:bh} = bucket;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(bx+bw/2, by+bh+4, bw*0.46, bh*0.06, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();

  if (textures.bucket) {
    ctx.drawImage(textures.bucket, bx, by, bw, bh);
  } else {
    ctx.beginPath();
    ctx.moveTo(bx-4,by); ctx.lineTo(bx+bw+4,by);
    ctx.lineTo(bx+bw-6,by+bh); ctx.lineTo(bx+6,by+bh); ctx.closePath();
    const bg = ctx.createLinearGradient(bx,by,bx+bw,by);
    bg.addColorStop(0,'#3b82f6'); bg.addColorStop(0.5,'#60a5fa'); bg.addColorStop(1,'#1d4ed8');
    ctx.fillStyle = bg; ctx.fill();
  }

  // Magnet aura ring
  if (magnetActive) {
    ctx.beginPath();
    ctx.arc(bx+bw/2, by+bh/2, bw*0.65, 0, Math.PI*2);
    const pct = magnetTimeRemaining / MAGNET_DURATION;
    ctx.strokeStyle = `rgba(167,139,250,${0.3 + 0.3 * Math.sin(Date.now()/150)})`;
    ctx.lineWidth = 2; ctx.stroke();
  }
  ctx.restore();
}

/* ════════════════════════════════════════════
   PARTICLES
   ════════════════════════════════════════════ */
function spawnCatchParticles(x, y, tier) {
  const qty = GAME_CONFIG.particles.catchCount;
  let col = GAME_CONFIG.particles.catchColor;
  if (tier === 'golden') col = 'rgba(255,215,0,';
  else if (tier === 3) col = `hsla(${Math.random()*360},100%,70%,`;
  else if (tier === 2) col = 'rgba(130,255,220,';
  else if (tier === 1) col = 'rgba(200,215,230,';
  for (let i = 0; i < qty; i++) {
    const a = -Math.PI/2 + (Math.random()-0.5)*0.6;
    const v = 0.6 + Math.random() * 2.0;
    particles.push({ x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, life:0.85, decay:0.035, r:1.5+Math.random()*2.5, col });
  }
}

function spawnEdgeParticles(x, y, tier) {
  const qty = GAME_CONFIG.particles.edgeExplosionCount;
  let col = GAME_CONFIG.particles.catchColor;
  if (tier === 'golden') col = 'rgba(255,215,0,';
  for (let i = 0; i < qty; i++) {
    const a = Math.random() * -Math.PI;
    const v = 2.5 + Math.random() * 4.5;
    particles.push({ x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v-1, life:1, decay:0.03+Math.random()*0.02, r:2+Math.random()*3, col });
  }
}

function spawnMissParticles(x) {
  const qty = GAME_CONFIG.particles.missCount;
  for (let i = 0; i < qty; i++)
    particles.push({ x, y:H-20, vx:(Math.random()-0.5)*4, vy:-(Math.random()*3+1), life:1, decay:0.05+Math.random()*0.04, r:2+Math.random()*3, col:GAME_CONFIG.particles.missColor });
}

function drawParticles() {
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col + p.life + ')';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
  }
}

/* ════════════════════════════════════════════
   BACKGROUND
   ════════════════════════════════════════════ */
function drawBg() {
  ctx.fillStyle = '#0a1628'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(100,180,255,0.04)'; ctx.lineWidth = 1;
  for (let y=80; y<H; y+=64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

/* ════════════════════════════════════════════
   PESOS FOR DROP
   ════════════════════════════════════════════ */
function pesosForDrop(tier) {
  if (tier === 'golden') {
    const baseTier = TIER_CONFIG[currentMaxTier] || TIER_CONFIG[0];
    return baseTier.pesos * GOLDEN_MULTIPLIER;
  }
  return TIER_CONFIG[tier].pesos;
}

/* ════════════════════════════════════════════
   UPDATE  (THE BIG ONE)
   ════════════════════════════════════════════ */
function update(dt) {
  if (!gameRunning) return;

  // Clamp dt hard — this is the main freeze fix.
  // If the tab was backgrounded or the device choked, dt could be 500ms+
  // which would cause drops to teleport. Cap at 32ms (≈30fps minimum).
  dt = Math.min(dt, 32);

  playTimeMs += dt;
  checkTierUnlocks();

  // ── Timestop tick ──
  if (timeStopActive) {
    timeStopTimeRemaining -= dt;
    if (timeStopTimeRemaining <= 0) {
      timeStopActive = false;
      btnTimeStop.classList.remove('active-pulse');
      let slowWindow = 5000;
      if (persist.timestopLevel > 0) slowWindow = GAME_CONFIG.upgradeTiers[persist.timestopLevel-1].slowDuration;
      postTimeStopSlowDuration = slowWindow;
      postTimeStopSlowTimer = slowWindow;
      // Spread drops out vertically so they don't all hit at once
      _spreadDropsAfterFreeze();
    }
  } else if (postTimeStopSlowTimer > 0) {
    postTimeStopSlowTimer -= dt;
  }

  // ── Magnet tick ──
  if (magnetActive) {
    magnetTimeRemaining -= dt;
    if (magnetTimeRemaining <= 0) {
      magnetActive = false;
      btnMagnet.classList.remove('magnet-active');
      updateHUD();
    }
  }

  // ── Difficulty ramp — first kicks in after 90s, then every interval from config ──
  dropTimer += dt; speedTick += dt;
  const RAMP_START_MS = 90000;  // don't ramp until 1m30s
  const RAMP_STEP_MS  = GAME_CONFIG.drops.difficultyTimeStep || 30000;
  if (playTimeMs >= RAMP_START_MS && speedTick > RAMP_STEP_MS) {
    speedTick = 0;
    dropSpeed    = Math.min(dropSpeed    + GAME_CONFIG.drops.speedDifficultyStep,    GAME_CONFIG.drops.maxSpeed);
    dropInterval = Math.max(dropInterval - GAME_CONFIG.drops.intervalDifficultyStep, GAME_CONFIG.drops.minInterval);
  }
  if (dropTimer > dropInterval) {
    dropTimer = 0; spawnDrop();
    if (dropSpeed > 6 && Math.random() < 0.3) spawnDrop();
  }

  // ── Bucket movement ──
  bucket.x += (bucket.targetX - bucket.x) * GAME_CONFIG.bucket.movementLerp;

  // ── Drop updates ──
  let rainbowCaughtByMagnet = 0;
  for (let i = drops.length-1; i >= 0; i--) {
    const d = drops[i];

    // Magnet pull
    if (magnetActive) {
      const rainbowCap = (d.tier === 3) ? rainbowCaughtByMagnet < 7 : true;
      if (rainbowCap) {
        const bCx = bucket.x + bucket.w / 2;
        const bCy = bucket.y + bucket.h / 2;
        const dx = bCx - d.x, dy = bCy - d.y;
        // Proportional pull: drops move MAGNET_PULL_FORCE fraction of their distance per frame
        d.x += dx * MAGNET_PULL_FORCE;
        d.y += dy * MAGNET_PULL_FORCE;
      }
    }

    // Speed calculation — NO scatter offset during post-slow ramp (prevents pileup)
    let spd;
    if (timeStopActive) {
      spd = 0;
    } else if (postTimeStopSlowTimer > 0) {
      // Ramp from POST_SLOW_SCALE back to full speed gradually
      const pct = 1 - (postTimeStopSlowTimer / postTimeStopSlowDuration);
      const rampFactor = POST_SLOW_SCALE + (1 - POST_SLOW_SCALE) * Math.min(pct, 1);
      spd = d.speed * rampFactor;
    } else {
      spd = d.speed + d.scatterOffset;
    }

    d.y += spd * (dt / 16);

    // ── Collision ──
    const bL = bucket.x;
    const bR = bucket.x + bucket.w;
    const bT = bucket.y;

    if (d.y + d.r >= bT && d.y - d.r <= bT + bucket.h) {
      if (d.x >= bL && d.x <= bR) {
        const edgePx = bucket.w * GAME_CONFIG.physics.edgeWidthPercent;
        const isCorner = (d.x <= bL + edgePx || d.x >= bR - edgePx) && d.y <= bT + GAME_CONFIG.physics.edgeHeightThreshold;

        if (isCorner) {
          spawnEdgeParticles(d.x, bT, d.tier);
        } else {
          spawnCatchParticles(d.x, d.y, d.tier);
          waterLevel = Math.min(waterLevel + 0.06, 0.7);
        }
        const earned = pesosForDrop(d.tier);
        score++; sessionPesos += earned; combo++;
        if (d.tier === 3 && magnetActive) rainbowCaughtByMagnet++;
        updateHUD(); showCombo(combo);
        drops.splice(i, 1); continue;
      }
    }

    if (d.y > H + 20) {
      spawnMissParticles(d.x);
      lives--; combo = 0; updateHUD();
      drops.splice(i, 1);
      if (lives <= 0) { endGame(); break; }
    }
  }

  waterLevel = Math.max(0, waterLevel - 0.0002 * dt);

  // Early-exit if endGame() fired inside the drop loop above
  if (!gameRunning) return;

  // ── Particles ──
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// Spread drops evenly after time stop so they don't all arrive at same frame
function _spreadDropsAfterFreeze() {
  // Sort by current y descending (highest on screen = lowest y = arrives last)
  const sorted = [...drops].sort((a,b) => a.y - b.y);
  // Give each drop a staggered y buffer so they don't all land simultaneously
  const GAP = 80; // pixels apart
  for (let i = 0; i < sorted.length; i++) {
    const d = sorted[i];
    const targetY = -30 - (sorted.length - 1 - i) * GAP;
    if (d.y < bucket.y - 60) { // only touch drops that are still high up
      d.y = Math.min(d.y, targetY + d.y * 0.5); // blend current with spread position
    }
    // Also randomize speed slightly to prevent synchronized arrival
    d.speed = GAME_CONFIG.drops.baseSpeed + Math.random() * 2.5;
    d.scatterOffset = (Math.random() - 0.5) * GAME_CONFIG.drops.scatterVariance;
  }
}

/* ════════════════════════════════════════════
   DRAW
   ════════════════════════════════════════════ */
function draw() {
  drawBg();
  for (const d of drops) drawDrop(d);
  if (timeStopActive) {
    ctx.fillStyle = 'rgba(147,197,253,0.10)';
    ctx.fillRect(0,0,W,H);
  }
  drawBucket();
  drawParticles();
}

function loop(ts) {
  const dt = lastTime === 0 ? 16 : ts - lastTime;
  lastTime = ts;
  update(dt);
  draw();
  if (gameRunning) animFrame = requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════
   SCREENS
   ════════════════════════════════════════════ */
const screens = {
  menu:     document.getElementById('screen-menu'),
  gameover: document.getElementById('screen-gameover'),
  shop:     document.getElementById('screen-shop'),
};

function showScreen(name) {
  Object.entries(screens).forEach(([k,el]) => el.classList.toggle('hidden', k !== name));
  // powerups visible only during game
  powerupContainer.classList.toggle('hidden', name !== null);
}

function showMainMenu() {
  document.getElementById('menu-pesos-count').textContent = persist.totalPesos;
  showScreen('menu');
}

function startGame() {
  cancelAnimationFrame(animFrame); // cancel any stale loop before starting fresh
  drops = []; particles = [];
  score = 0; sessionPesos = 0; combo = 0;
  dropInterval = GAME_CONFIG.drops.baseInterval;
  dropTimer = 0; dropSpeed = GAME_CONFIG.drops.baseSpeed;
  speedTick = 0; waterLevel = 0; playTimeMs = 0;
  postTimeStopSlowTimer = 0;
  timeStopActive = false; timeStopTimeRemaining = 0; postTimeStopSlowDuration = 5000;
  magnetActive = false; magnetTimeRemaining = 0;
  currentMaxTier = 0; tierUnlockShown = 0;
  goldenTimer = 0; nextGoldenAt = _randomGoldenInterval();
  MAX_LIVES = persist.purchases.includes('bucket_upgrade') ? 5 : 3;
  lives = MAX_LIVES;
  btnTimeStop.classList.remove('active-pulse');
  btnMagnet.classList.remove('magnet-active');
  bucket.x = W/2 - bucket.w/2; bucket.targetX = bucket.x;
  updateHUD();
  showScreen(null);
  gameRunning = true; lastTime = 0;
  animFrame = requestAnimationFrame(loop);
}

async function endGame() {
  if (!gameRunning) return; // guard: prevent double-call from same frame
  gameRunning = false; cancelAnimationFrame(animFrame);
  persist.totalPesos += sessionPesos;
  await saveProgress(persist);
  document.getElementById('end-score').textContent = score;
  document.getElementById('end-pesos').textContent = sessionPesos;
  document.getElementById('end-time').textContent = fmtTime(playTimeMs);
  document.getElementById('gameover-sub').innerHTML =
    `You caught <strong style="color:#4fc3f7">${score} drops</strong> and earned <strong style="color:#ffd700">${sessionPesos} pesos</strong>!`;
  showScreen('gameover');
}

/* ════════════════════════════════════════════
   SHOP
   ════════════════════════════════════════════ */
function mkShopItem(iconHTML, badge, name, desc, actionHTML) {
  const el = document.createElement('div');
  el.className = 'shop-item';
  el.innerHTML = `
    <div class="shop-item-icon">${iconHTML}</div>
    <div class="shop-item-info">
      <span class="upgrade-badge">${badge}</span>
      <div class="shop-item-name">${name}</div>
      <div class="shop-item-desc">${desc}</div>
    </div>
    <div class="shop-item-action">${actionHTML}</div>`;
  return el;
}

function buyBtn(id, cost, canAfford) {
  if (!canAfford) return `<button class="btn-buy cant-afford" disabled><img src="coin.png" onerror="this.style.display='none'"> ${cost}</button>`;
  return `<button class="btn-buy" id="${id}"><img src="coin.png" onerror="this.style.display='none'"> ${cost}</button>`;
}

function renderShop() {
  document.getElementById('shop-pesos-count').textContent = persist.totalPesos;
  const c = document.getElementById('shop-items');
  c.innerHTML = '';

  const P = persist.totalPesos;

  // 1. Hydra Bucket
  const bOwned = persist.purchases.includes('bucket_upgrade');
  const bCost = GAME_CONFIG.powerups.reinforcedRimPrice;
  const bEl = mkShopItem(
    `<img src="bucket.png" onerror="this.style.display='none'">`,
    bOwned ? '✓ Owned' : '+2 Lives',
    'Hydra Bucket',
    'Reinforced bucket — upgrades to 5 max lives.',
    bOwned ? `<div class="btn-owned">✓ Owned</div>` : buyBtn('buy-bucket', bCost, P >= bCost)
  );
  if (bOwned) bEl.classList.add('owned');
  c.appendChild(bEl);
  if (!bOwned && P >= bCost) bEl.querySelector('#buy-bucket').onclick = async () => {
    persist.totalPesos -= bCost; persist.purchases.push('bucket_upgrade');
    await saveProgress(persist); renderShop();
  };

  // 2. Chronos Freeze
  const tsCost = GAME_CONFIG.powerups.basePrice;
  const maxStock = GAME_CONFIG.powerups.maxConsumableStock;
  const atMax = persist.timestopCount >= maxStock;
  const tsEl = mkShopItem(
    `<img src="hourglass.png" onerror="this.textContent='⏳'">`,
    `Stock: ${persist.timestopCount}/${maxStock}`,
    'Chronos Freeze',
    'Freezes all drops in mid-air for 2s.',
    atMax ? `<div class="btn-owned" style="color:#ff9800;border-color:rgba(255,152,0,0.3)">MAX</div>`
          : buyBtn('buy-ts', tsCost, P >= tsCost)
  );
  c.appendChild(tsEl);
  if (!atMax && P >= tsCost) tsEl.querySelector('#buy-ts').onclick = async () => {
    persist.totalPesos -= tsCost; persist.timestopCount++;
    await saveProgress(persist); renderShop();
  };

  // 3. Hydra Cooldown upgrade
  const lvl = persist.timestopLevel;
  const maxLvl = GAME_CONFIG.upgradeTiers.length;
  const maxed = lvl >= maxLvl;
  const nextUp = !maxed ? GAME_CONFIG.upgradeTiers[lvl] : null;
  const upEl = mkShopItem(
    `<img src="hourglass.png" style="filter:hue-rotate(165deg)" onerror="this.textContent='⚡'">`,
    `LVL ${lvl}`,
    'Hydra Cooldown',
    maxed ? 'Maximum reached!' : nextUp.desc,
    maxed ? `<div class="btn-owned">ELITE</div>`
          : buyBtn('buy-ts-up', nextUp.cost, P >= nextUp.cost)
  );
  if (maxed) upEl.classList.add('owned');
  c.appendChild(upEl);
  if (!maxed && P >= nextUp.cost) upEl.querySelector('#buy-ts-up').onclick = async () => {
    persist.totalPesos -= nextUp.cost; persist.timestopLevel++;
    await saveProgress(persist); renderShop();
  };

  // 4. Aqua Magnet
  const mCost = 80;
  const mMax = GAME_CONFIG.powerups.maxConsumableStock;
  const mAtMax = persist.magnetCount >= mMax;
  const mEl = mkShopItem(
    `<span style="font-size:28px">🧲</span>`,
    `Stock: ${persist.magnetCount}/${mMax}`,
    'Aqua Magnet',
    'Pulls all drops into the bucket for 10s. Can\'t use Freeze while active.',
    mAtMax ? `<div class="btn-owned" style="color:#a78bfa;border-color:rgba(167,139,250,0.3)">MAX</div>`
           : buyBtn('buy-magnet', mCost, P >= mCost)
  );
  c.appendChild(mEl);
  if (!mAtMax && P >= mCost) mEl.querySelector('#buy-magnet').onclick = async () => {
    persist.totalPesos -= mCost; persist.magnetCount++;
    await saveProgress(persist); renderShop();
  };

  // 5. Life Refill (one at a time, can't stack)
  const lrCost = 120;
  const lrOwned = persist.hasLifeRefill;
  const lrEl = mkShopItem(
    `<span style="font-size:28px">❤️</span>`,
    lrOwned ? '✓ Ready' : 'One-use',
    'Life Vessel',
    'Instantly refills all lives mid-game. Only one can be held at a time.',
    lrOwned ? `<div class="btn-owned" style="color:#ff6b6b;border-color:rgba(255,107,107,0.3)">✓ Ready</div>`
            : buyBtn('buy-lr', lrCost, P >= lrCost)
  );
  if (lrOwned) lrEl.classList.add('owned');
  c.appendChild(lrEl);
  if (!lrOwned && P >= lrCost) lrEl.querySelector('#buy-lr').onclick = async () => {
    persist.totalPesos -= lrCost; persist.hasLifeRefill = true;
    await saveProgress(persist); renderShop();
  };
}

/* ════════════════════════════════════════════
   INPUT
   ════════════════════════════════════════════ */
document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-play-again').addEventListener('click', startGame);
document.getElementById('btn-goto-menu').addEventListener('click', showMainMenu);
document.getElementById('btn-open-shop').addEventListener('click', () => { renderShop(); showScreen('shop'); });
document.getElementById('btn-close-shop').addEventListener('click', showMainMenu);

btnTimeStop.addEventListener('click', e => { e.stopPropagation(); triggerTimeStop(); });
btnMagnet.addEventListener('click',   e => { e.stopPropagation(); triggerMagnet(); });
btnLifeRefill.addEventListener('click',e => { e.stopPropagation(); triggerLifeRefill(); });

let lastTouchX = null;
canvas.addEventListener('touchstart', e => { e.preventDefault(); lastTouchX = e.touches[0].clientX; audioCtx.resume(); }, {passive:false});
canvas.addEventListener('touchmove',  e => {
  e.preventDefault(); if (!gameRunning) return;
  const tx = e.touches[0].clientX, dx = tx - lastTouchX; lastTouchX = tx;
  bucket.targetX = Math.max(0, Math.min(W - bucket.w, bucket.targetX + dx * GAME_CONFIG.bucket.touchSpeedScale));
}, {passive:false});
canvas.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  bucket.targetX = Math.max(0, Math.min(W - bucket.w, e.clientX - bucket.w/2));
});
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  const step = W * GAME_CONFIG.bucket.keyboardStepRatio;
  if (e.key === 'ArrowLeft')  bucket.targetX = Math.max(0, bucket.targetX - step);
  if (e.key === 'ArrowRight') bucket.targetX = Math.min(W - bucket.w, bucket.targetX + step);
  if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); triggerTimeStop(); }
  if (e.key === 'm' || e.key === 'M') triggerMagnet();
  if (e.key === 'h' || e.key === 'H') triggerLifeRefill();
});

/* ════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════ */
(async () => {
  await cgInit();
  await preloadAudio();
  const saved = await loadProgress();
  if (saved) {
    const safeInt  = (v, min, max) => Math.min(max, Math.max(min, Number.isFinite(+v) ? Math.floor(+v) : 0));
    persist.totalPesos    = safeInt(saved.totalPesos, 0, 99999999);
    persist.purchases     = Array.isArray(saved.purchases) ? saved.purchases.filter(p => typeof p === 'string') : [];
    persist.timestopCount = safeInt(saved.timestopCount, 0, GAME_CONFIG.powerups.maxConsumableStock);
    persist.timestopLevel = safeInt(saved.timestopLevel, 0, GAME_CONFIG.upgradeTiers.length);
    persist.magnetCount   = safeInt(saved.magnetCount, 0, GAME_CONFIG.powerups.maxConsumableStock);
    persist.hasLifeRefill = !!saved.hasLifeRefill;
  }
  await Promise.all([
    loadImg('bucket',    'bucket.png'),
    loadImg('coin',      'coin.png'),
    loadImg('shop',      'shop.png'),
    loadImg('hourglass', 'hourglass.png'),
  ]);
  resize();
  draw();
  showMainMenu();
})();
</script>
