<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Drop Catch</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#0a1628; display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; font-family:-apple-system,BlinkMacSystemFont,sans-serif; overflow:hidden; touch-action:none; position:fixed; width:100%;
}
#hud {
  position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center;
  padding:14px 20px; padding-top:max(env(safe-area-inset-top),14px); background:rgba(10,22,40,0.88); z-index:10;
  border-bottom:1px solid rgba(100,180,255,0.15);
}
.hud-item { display:flex; flex-direction:column; align-items:center; }
.hud-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(160,210,255,0.6); font-weight:500; }
.hud-value { font-size:22px; font-weight:700; color:#fff; line-height:1.1; }
.hud-value.pesos { color:#ffd700; }
#powerup-container { position:fixed; top:max(env(safe-area-inset-top),86px); right:20px; z-index:15; }
.powerup-btn {
  width:72px; height:72px; background:rgba(10,22,40,0.9); border:2.5px solid #4fc3f7; border-radius:50px;
  display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 16px rgba(0,0,0,0.5); position:relative;
}
.powerup-btn.disabled { border-color:rgba(160,210,255,0.2); opacity:0.4; cursor:not-allowed; }
.powerup-btn img { width:42px; height:42px; object-fit:contain; }
.powerup-count {
  position:absolute; bottom:-2px; right:-2px; background:#ff9800; color:#fff; font-size:12px; font-weight:800;
  padding:3px 8px; border-radius:12px; border:2px solid #0a1628;
}
.powerup-btn.active-pulse { border-color:#ffd700; animation:pulseGlow 0.8s infinite alternate; }
@keyframes pulseGlow { 0% { box-shadow:0 0 4px rgba(255,215,0,0.4); } 100% { box-shadow:0 0 20px rgba(255,215,0,0.9); } }
canvas { display:block; touch-action:none; }
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; padding:24px; background:rgba(10,22,40,0.96); }
.screen.hidden { display:none; }
.menu-title { font-size:48px; font-weight:800; color:#fff; text-align:center; line-height:1.0; margin-bottom:8px; }
.menu-title .accent { color:#4fc3f7; }
.menu-sub { font-size:14px; color:rgba(160,210,255,0.6); text-align:center; margin-bottom:40px; max-width:260px; }
.menu-pesos-badge { display:flex; align-items:center; gap:8px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.25); border-radius:12px; padding:10px 18px; margin-bottom:32px; }
.menu-pesos-badge img { width:22px; height:22px; }
.menu-pesos-badge span { font-size:15px; color:#ffd700; font-weight:700; }
.btn-primary { background:linear-gradient(135deg,#4fc3f7,#0288d1); border:none; border-radius:50px; padding:16px 52px; font-size:18px; font-weight:700; color:#fff; cursor:pointer; width:220px; text-align:center; }
.btn-shop { background:transparent; border:none; margin-top:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.btn-shop img { width:220px; height:60px; object-fit:contain; }
.btn-secondary { background:transparent; border:1.5px solid rgba(100,180,255,0.3); border-radius:50px; padding:13px 36px; font-size:15px; font-weight:600; color:rgba(160,210,255,0.75); cursor:pointer; margin-top:12px; width:220px; }
.stat-row { display:flex; gap:16px; margin-bottom:28px; }
.stat-box { display:flex; flex-direction:column; align-items:center; background:rgba(79,195,247,0.07); border:1px solid rgba(79,195,247,0.2); border-radius:14px; padding:14px 20px; min-width:100px; }
.stat-box-label { font-size:11px; text-transform:uppercase; color:rgba(160,210,255,0.55); }
.stat-box-value { font-size:28px; font-weight:700; color:#fff; }
.stat-box-value.gold { color:#ffd700; }
.shop-header { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:360px; margin-bottom:20px; }
.shop-title { font-size:28px; font-weight:800; color:#fff; }
.shop-balance { display:flex; align-items:center; gap:6px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.2); border-radius:20px; padding:6px 14px; color:#ffd700; font-weight:700; }
.shop-bg { width:100%; max-width:360px; border-radius:20px; background:rgba(10,22,40,0.6); margin-bottom:16px; flex:1; max-height:340px; overflow-y:auto; border:1px solid rgba(100,180,255,0.1); }
.shop-items { padding:16px; display:flex; flex-direction:column; gap:12px; }
.shop-item { display:flex; align-items:center; gap:14px; background:rgba(10,22,40,0.8); border:1px solid rgba(100,180,255,0.15); border-radius:14px; padding:14px 16px; }
.shop-item-info { flex:1; }
.shop-item-name { font-size:15px; font-weight:700; color:#fff; }
.shop-item-desc { font-size:12px; color:rgba(160,210,255,0.6); }
.btn-buy { background:linear-gradient(135deg,#ffd700,#f59e00); border:none; border-radius:20px; padding:8px 14px; font-size:13px; font-weight:700; color:#3a2000; cursor:pointer; }
.btn-buy.cant-afford { background:rgba(100,120,150,0.3); color:rgba(160,210,255,0.4); cursor:default; }
.btn-owned { background:rgba(79,195,247,0.12); border:1px solid rgba(79,195,247,0.3); border-radius:20px; padding:8px 14px; font-size:13px; color:#4fc3f7; font-weight:700; }
#combo-popup { position:fixed; top:90px; left:50%; transform:translateX(-50%); font-size:22px; font-weight:800; color:#ffd700; z-index:15; opacity:0; transition:opacity 0.3s; }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-item"><span class="hud-label">Score</span><span class="hud-value" id="hud-score">0</span></div>
  <div class="hud-item"><div style="color:#ff6b6b; font-weight:800;" id="hud-lives-count">3</div><span class="hud-label">Lives</span></div>
  <div class="hud-item"><span class="hud-label">Pesos</span><span class="hud-value pesos" id="hud-pesos">0</span></div>
</div>

<div id="powerup-container" class="hidden">
  <button class="powerup-btn" id="btn-use-timestop">
    <img src="hourglass.png" alt="⏳">
    <span class="powerup-count" id="powerup-hud-count">0</span>
  </button>
</div>

<canvas id="game"></canvas>
<div id="combo-popup"></div>

<div class="screen" id="screen-menu">
  <div class="menu-title">Drop<br><span class="accent">Catch</span> 💧</div>
  <div class="menu-sub">Catch falling drops!</div>
  <div class="menu-pesos-badge"><span id="menu-pesos-count">0</span> <span>Total Pesos</span></div>
  <button class="btn-primary" id="btn-play">Play</button>
  <button class="btn-shop" id="btn-open-shop"><img src="shop.png" alt="Shop"></button>
</div>

<div class="screen hidden" id="screen-gameover">
  <div class="gameover-title">Game Over 💀</div>
  <div class="stat-row">
    <div class="stat-box"><span class="stat-box-label">Score</span><span class="stat-box-value" id="end-score">0</span></div>
    <div class="stat-box"><span class="stat-box-label">Pesos</span><span class="stat-box-value gold" id="end-pesos">0</span></div>
  </div>
  <button class="btn-primary" id="btn-play-again">Play Again</button>
  <button class="btn-secondary" id="btn-goto-menu">Main Menu</button>
</div>

<div class="screen hidden" id="screen-shop">
  <div class="shop-header"><div class="shop-title">🛒 Shop</div><div class="shop-balance"><span id="shop-pesos-count">0</span></div></div>
  <div class="shop-bg"><div class="shop-items" id="shop-items"></div></div>
  <button class="btn-secondary" id="btn-close-shop">← Back</button>
</div>

<script>
const SAVE_KEY = 'dropcatch_save';
let persist = { totalPesos: 0, purchases: [], timestopCount: 0, timestopLevel: 0 };
let lives = 3, score = 0, sessionPesos = 0, combo = 0;
let dropInterval = 1400, dropTimer = 0, dropSpeed = 3.5, speedTick = 0;
let gameRunning = false, animFrame, lastTime = 0;

let timeStopActive = false;
let timeStopTimeRemaining = 0;
let postTimeStopSlowTimer = 0; // The 5-second lingering slow-down variable

const BUCKET_H = 82;         // Increased height to fix visual asset stretching
const BUCKET_W_RATIO = 0.24; // Slimmed down width so it looks proportional
let bucket = { x: 0, y: 0, w: 0, h: BUCKET_H, targetX: 0 };
let drops = [], particles = [];

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

const textures = {};
function loadImg(key, src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => { textures[key] = img; resolve(img); };
    img.onerror = () => { textures[key] = null; resolve(null); };
    img.src = src;
  });
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  bucket.w = W * BUCKET_W_RATIO;
  bucket.y = H - 110;
  if (!gameRunning) { bucket.x = W/2 - bucket.w/2; bucket.targetX = bucket.x; }
}
window.addEventListener('resize', resize);
resize();

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-pesos').textContent = sessionPesos;
  document.getElementById('hud-lives-count').textContent = lives;
  document.getElementById('powerup-hud-count').textContent = persist.timestopCount;
  document.getElementById('btn-use-timestop').classList.toggle('disabled', persist.timestopCount <= 0);
}

function triggerTimeStop() {
  if (!gameRunning || timeStopActive || persist.timestopCount <= 0) return;
  persist.timestopCount--;
  timeStopActive = true;
  timeStopTimeRemaining = 4000; // Base duration 4 seconds
  postTimeStopSlowTimer = 0;    // Clear any leftover post-timers
  document.getElementById('btn-use-timestop').classList.add('active-pulse');
  updateHUD();
  localStorage.setItem(SAVE_KEY, JSON.stringify(persist));
}

function spawnDrop() {
  drops.push({
    x: Math.random() * (W - 32) + 16,
    y: -30,
    r: 10 + Math.random() * 5,
    speed: dropSpeed + Math.random() * 1.5
  });
}

function drawDrop(d) {
  ctx.save();
  const {x, y, r} = d;
  ctx.beginPath();
  ctx.moveTo(x, y - r * 1.6);
  ctx.bezierCurveTo(x + r * 0.6, y - r * 0.6, x + r, y + r * 0.4, x, y + r);
  ctx.bezierCurveTo(x - r, y + r * 0.4, x - r * 0.6, y - r * 0.6, x, y - r * 1.6);
  ctx.closePath();
  const g = ctx.createLinearGradient(x-r, y-r, x+r, y+r);
  g.addColorStop(0, '#b4e6ff'); g.addColorStop(0.5, '#4fc3f7'); g.addColorStop(1, '#0288d1');
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
}

function drawBucket() {
  if (textures.bucket) {
    ctx.drawImage(textures.bucket, bucket.x, bucket.y, bucket.w, bucket.h);
  } else {
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(bucket.x, bucket.y, bucket.w, bucket.h);
  }
}

function spawnCatchParticles(x, y) {
  // FIXED: Crisp transparent water blue particle splashes upon contact. No stone artifacts.
  for (let i = 0; i < 12; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: -(Math.random() * 4 + 2),
      life: 1,
      decay: 0.04,
      color: 'rgba(79, 195, 247, '
    });
  }
}

function spawnMissParticles(x) {
  for (let i = 0; i < 6; i++) {
    particles.push({ x, y: H - 20, vx: (Math.random() - 0.5) * 4, vy: -(Math.random() * 3 + 1), life: 1, decay: 0.06, color: 'rgba(239, 68, 68, ' });
  }
}

function update(dt) {
  if (!gameRunning) return;

  // Handle core time-stop state changes
  if (timeStopActive) {
    timeStopTimeRemaining -= dt;
    if (timeStopTimeRemaining <= 0) {
      timeStopActive = false;
      postTimeStopSlowTimer = 5000; // Trigger your requested 5-second lingering cooldown phase
      document.getElementById('btn-use-timestop').classList.remove('active-pulse');
    }
  } else if (postTimeStopSlowTimer > 0) {
    postTimeStopSlowTimer -= dt; // Counts down the 5 seconds safely frame by frame
  }

  dropTimer += dt; speedTick += dt;
  if (speedTick > 8000) {
    speedTick = 0;
    dropSpeed = Math.min(dropSpeed + 0.45, 9.5);
    dropInterval = Math.max(dropInterval - 90, 600);
  }
  if (dropTimer > dropInterval) { dropTimer = 0; spawnDrop(); }

  // FIXED: Bucket responsiveness multiplier raised to 0.45 to snap immediately
  bucket.x += (bucket.targetX - bucket.x) * 0.45;

  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    
    // FIXED: Drops speed drops down to a slow crawl during TimeStop OR inside the 5-second lingering window
    let currentSpeed = d.speed;
    if (timeStopActive || postTimeStopSlowTimer > 0) {
      currentSpeed = d.speed * 0.20; // 5x slower heavy fluid movement
    }

    d.y += currentSpeed * (dt / 16);

    // Collision Boundaries matching the updated taller bucket
    if (d.y >= bucket.y && d.y <= bucket.y + 25 && d.x >= bucket.x - 4 && d.x <= bucket.x + bucket.w + 4) {
      score++; sessionPesos += 5; combo++; updateHUD();
      spawnCatchParticles(d.x, bucket.y);
      drops.splice(i, 1); continue;
    }
    if (d.y > H + 20) {
      spawnMissParticles(d.x); lives--; combo = 0; updateHUD();
      drops.splice(i, 1);
      if (lives <= 0) endGame();
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  ctx.fillStyle = '#0a1628'; ctx.fillRect(0, 0, W, H);
  for (const d of drops) drawDrop(d);
  drawBucket();
  for (const p of particles) {
    ctx.fillStyle = p.color + p.life + ')';
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
  }
}

function loop(ts) {
  const dt = Math.min(ts - lastTime, 50); lastTime = ts;
  update(dt); draw();
  if (gameRunning) animFrame = requestAnimationFrame(loop);
}

function showScreen(id) {
  ['screen-menu', 'screen-gameover', 'screen-shop'].forEach(s => document.getElementById(s).classList.add('hidden'));
  if(id) document.getElementById(id).classList.remove('hidden');
  document.getElementById('powerup-container').classList.toggle('hidden', id !== null);
}

function startGame() {
  drops = []; particles = []; score = 0; sessionPesos = 0; combo = 0;
  dropInterval = 1400; dropSpeed = 3.5; lives = 3;
  timeStopActive = false; postTimeStopSlowTimer = 0;
  bucket.x = W/2 - bucket.w/2; bucket.targetX = bucket.x;
  updateHUD(); showScreen(null);
  gameRunning = true; lastTime = performance.now();
  animFrame = requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false; cancelAnimationFrame(animFrame);
  persist.totalPesos += sessionPesos;
  localStorage.setItem(SAVE_KEY, JSON.stringify(persist));
  document.getElementById('end-score').textContent = score;
  document.getElementById('end-pesos').textContent = sessionPesos;
  showScreen('screen-gameover');
}

function renderShop() {
  document.getElementById('shop-pesos-count').textContent = persist.totalPesos;
  const container = document.getElementById('shop-items');
  container.innerHTML = `
    <div class="shop-item">
      <div class="shop-item-info">
        <div class="shop-item-name">Time Stop Power-up</div>
        <div class="shop-item-desc">Freezes drops momentarily, leaving a 5s slow lingering effect.</div>
      </div>
      <button class="btn-buy" id="buy-ts-btn">💰 160</button>
    </div>
  `;
  document.getElementById('buy-ts-btn').addEventListener('click', () => {
    if (persist.totalPesos >= 160) {
      persist.totalPesos -= 160; persist.timestopCount++;
      localStorage.setItem(SAVE_KEY, JSON.stringify(persist)); renderShop();
    }
  });
}

document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-play-again').addEventListener('click', startGame);
document.getElementById('btn-goto-menu').addEventListener('click', () => {
  document.getElementById('menu-pesos-count').textContent = persist.totalPesos;
  showScreen('screen-menu');
});
document.getElementById('btn-open-shop').addEventListener('click', () => { renderShop(); showScreen('screen-shop'); });
document.getElementById('btn-close-shop').addEventListener('click', () => { showScreen('screen-menu'); });
document.getElementById('btn-use-timestop').addEventListener('click', triggerTimeStop);

canvas.addEventListener('touchmove', e => {
  if (!gameRunning) return;
  bucket.targetX = Math.max(0, Math.min(W - bucket.w, e.touches[0].clientX - bucket.w / 2));
});
canvas.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  bucket.targetX = Math.max(0, Math.min(W - bucket.w, e.clientX - bucket.w / 2));
});
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  const step = W * 0.12; // Snappy keyboard tracking speed step
  if (e.key === 'ArrowLeft') bucket.targetX = Math.max(0, bucket.targetX - step);
  if (e.key === 'ArrowRight') bucket.targetX = Math.min(W - bucket.w, bucket.targetX + step);
  if (e.key === ' ') triggerTimeStop();
});

const saved = localStorage.getItem(SAVE_KEY);
if (saved) persist = JSON.parse(saved);
document.getElementById('menu-pesos-count').textContent = persist.totalPesos;

Promise.all([loadImg('bucket', 'bucket.png')]).then(() => { draw(); });
</script>
</body>
</html>
