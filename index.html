<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Drop Catch</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:#0a1628;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; height:-webkit-fill-available;
  font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  overflow:hidden; touch-action:none; position:fixed; width:100%;
}

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 20px;
  padding-top:max(env(safe-area-inset-top),14px);
  background:rgba(10,22,40,0.92); z-index:10;
  border-bottom:1px solid rgba(100,180,255,0.15);
  backdrop-filter: blur(8px);
}
.hud-item { display:flex; flex-direction:column; align-items:center; }
.hud-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(160,210,255,0.6); font-weight:500; }
.hud-value { font-size:22px; font-weight:700; color:#fff; line-height:1.1; }
.hud-pesos-wrapper { display:flex; align-items:center; gap:4px; }
.hud-pesos-icon { width:18px; height:18px; object-fit:contain; }
.hud-value.pesos { color:#ffd700; }
.hud-lives-display { display:flex; align-items:center; gap:5px; margin-top:2px; }
.hud-lives-count { font-size:18px; font-weight:800; color:#ff6b6b; }
.hud-lives-label { font-size:10px; color:rgba(255,107,107,0.7); text-transform:uppercase; letter-spacing:1px; }

/* ── POWERUP OVERLAY ── */
#powerup-container {
  position: fixed;
  top: max(env(safe-area-inset-top), 86px);
  right: 20px;
  z-index: 15;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.powerup-btn {
  width: 72px;
  height: 72px;
  background: rgba(10, 22, 40, 0.9);
  border: 2.5px solid #4fc3f7;
  border-radius: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(0,0,0,0.5);
  position: relative;
  transition: transform 0.1s;
}
.powerup-btn:active { transform: scale(0.9); }
.powerup-btn.disabled { border-color: rgba(160,210,255,0.2); opacity: 0.4; cursor: not-allowed; }
.powerup-btn img { width: 42px; height: 42px; object-fit: contain; }

.powerup-count {
  position: absolute;
  bottom: -2px;
  right: -2px;
  background: #ff9800;
  color: #fff;
  font-size: 12px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 12px;
  border: 2px solid #0a1628;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.powerup-btn.active-pulse {
  border-color: #ffd700;
  animation: pulseGlow 0.6s infinite alternate;
}
@keyframes pulseGlow {
  0% { box-shadow: 0 0 4px rgba(255,215,0,0.4); }
  100% { box-shadow: 0 0 22px rgba(255,215,0,0.9); }
}

canvas { display:block; touch-action:none; }

/* ── SCREENS ── */
.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:20; padding:24px;
  padding-bottom:max(env(safe-area-inset-bottom),24px);
  background:rgba(8, 16, 28, 0.97);
}
.screen.hidden { display:none; }

/* ── MAIN MENU ── */
.menu-title {
  font-size:48px; font-weight:800; color:#fff;
  text-align:center; line-height:1.0; margin-bottom:8px; letter-spacing:-1px;
}
.menu-title .accent { color:#4fc3f7; }
.menu-sub {
  font-size:14px; color:rgba(160,210,255,0.6);
  text-align:center; margin-bottom:40px; line-height:1.6; max-width:260px;
}
.menu-pesos-badge {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,215,0,0.08);
  border:1px solid rgba(255,215,0,0.2);
  border-radius:12px; padding:10px 18px; margin-bottom:32px;
}
.menu-pesos-badge img { width:22px; height:22px; object-fit:contain; }
.menu-pesos-badge span { font-size:15px; color:#ffd700; font-weight:700; }
.menu-pesos-badge .pesos-label { font-size:11px; color:rgba(255,215,0,0.6); font-weight:500; margin-left:2px; }

/* ── BUTTONS ── */
.btn-primary {
  background:linear-gradient(135deg,#4fc3f7,#0288d1);
  border:none; border-radius:50px; padding:16px 52px;
  font-size:18px; font-weight:700; color:#fff; cursor:pointer;
  -webkit-user-select:none; user-select:none; min-height:54px; width:220px;
  text-align:center; box-shadow: 0 4px 14px rgba(2, 136, 209, 0.4);
}
.btn-shop {
  background:transparent; border:none; padding:0; cursor:pointer; margin-top:16px; 
  height:44px; width:220px; display:flex; align-items:center; justify-content:center;
  -webkit-user-select:none; user-select:none;
}
.btn-shop img { width: 100%; height: 100%; object-fit: fill; border-radius: 4px; }
.btn-secondary {
  background:transparent; border:1.5px solid rgba(100,180,255,0.3);
  border-radius:50px; padding:13px 36px; font-size:15px; font-weight:600; color:rgba(160,210,255,0.75);
  cursor:pointer; margin-top:12px; min-height:48px; width:220px; -webkit-user-select:none; user-select:none;
}
.drops-tip { margin-top:24px; font-size:12px; color:rgba(160,210,255,0.38); text-align:center; line-height:1.4; }

/* ── CREDIT ── */
.credit { margin-top:28px; display:flex; align-items:center; gap:4px; }
.credit-text { font-size:12px; color:rgba(160,210,255,0.35); margin-right:5px; }
.letter-o { font-size:20px; font-weight:800; color:#4fc3f7; font-style:italic; text-shadow:0 0 10px rgba(79,195,247,0.5); }
.credit-amp { font-size:13px; color:rgba(160,210,255,0.35); margin:0 2px; }
.letter-s {
  font-size:22px; font-weight:900; background:linear-gradient(135deg,#ffd700,#ff9800);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  font-style:italic; filter:drop-shadow(0 0 5px rgba(255,200,0,0.4));
}

/* ── GAME OVER SCREEN ── */
.gameover-title { font-size:40px; font-weight:800; color:#fff; text-align:center; margin-bottom:8px; }
.gameover-sub { font-size:14px; color:rgba(160,210,255,0.65); text-align:center; margin-bottom:28px; line-height:1.6; max-width:270px; }
.stat-row { display:flex; gap:16px; margin-bottom:28px; }
.stat-box {
  display:flex; flex-direction:column; align-items:center;
  background:rgba(79,195,247,0.07); border:1px solid rgba(79,195,247,0.2);
  border-radius:14px; padding:14px 20px; min-width:100px;
}
.stat-box-label { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:rgba(160,210,255,0.55); margin-bottom:4px; }
.stat-box-value { font-size:28px; font-weight:700; color:#fff; }
.stat-box-value.gold { color:#ffd700; }
.stat-box-icon { display:flex; align-items:center; gap:6px; }
.stat-box-icon img { width:20px; height:20px; object-fit:contain; }

/* ── SHOP SCREEN ── */
.shop-header { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:360px; margin-bottom:20px; }
.shop-title { font-size:28px; font-weight:800; color:#fff; }
.shop-balance {
  display:flex; align-items:center; gap:6px;
  background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.2);
  border-radius:20px; padding:6px 14px;
}
.shop-balance img { width:18px; height:18px; object-fit:contain; }
.shop-balance span { font-size:15px; font-weight:700; color:#ffd700; }

.shop-bg { width:100%; max-width:360px; border-radius:20px; overflow:hidden; margin-bottom:16px; flex:1; max-height:340px; position:relative; }
.shop-bg-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.18; border-radius:20px; }
.shop-items { position:relative; z-index:1; padding:16px; display:flex; flex-direction:column; gap:12px; height:100%; overflow-y:auto; }

.shop-item { display:flex; align-items:center; gap:14px; background:rgba(10,22,40,0.85); border:1px solid rgba(100,180,255,0.15); border-radius:14px; padding:14px 16px; }
.shop-item.owned { border-color:rgba(79,195,247,0.4); }
.shop-item-icon {
  width:54px; height:54px; border-radius:10px; background:rgba(79,195,247,0.1); border:1px solid rgba(79,195,247,0.2);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden;
}
.shop-item-icon img { width:46px; height:46px; object-fit:contain; }
.shop-item-info { flex:1; }
.shop-item-name { font-size:15px; font-weight:700; color:#fff; margin-bottom:3px; }
.shop-item-desc { font-size:12px; color:rgba(160,210,255,0.6); line-height:1.4; }
.shop-item-action { flex-shrink:0; }
.btn-buy {
  display:flex; align-items:center; gap:5px; background:linear-gradient(135deg,#ffd700,#f59e00);
  border:none; border-radius:20px; padding:8px 14px; font-size:13px; font-weight:700; color:#3a2000; cursor:pointer;
  -webkit-user-select:none; user-select:none; white-space:nowrap;
}
.btn-buy img { width:14px; height:14px; object-fit:contain; }
.btn-buy.cant-afford { background:rgba(100,120,150,0.3); color:rgba(160,210,255,0.4); border:1px solid rgba(100,180,255,0.15); cursor:default; }
.btn-owned { background:rgba(79,195,247,0.12); border:1px solid rgba(79,195,247,0.3); border-radius:20px; padding:8px 14px; font-size:13px; font-weight:700; color:#4fc3f7; white-space:nowrap; }
.upgrade-badge { display:inline-flex; align-items:center; gap:4px; background:rgba(255,215,0,0.15); border:1px solid rgba(255,215,0,0.3); border-radius:6px; padding:2px 7px; font-size:11px; color:#ffd700; margin-bottom:4px; font-weight:600; }

/* ── COMBO ── */
#combo-popup {
  position:fixed; top:90px; left:50%; transform:translateX(-50%);
  font-size:22px; font-weight:800; color:#ffd700; z-index:15; pointer-events:none; opacity:0; transition:opacity 0.3s; white-space:nowrap;
}
</style>

<script src="config.js"></script>

</head>
<body>

<div id="hud">
  <div class="hud-item">
    <span class="hud-label">Score</span>
    <span class="hud-value" id="hud-score">0</span>
  </div>
  <div class="hud-item">
    <div class="hud-lives-display" id="hud-lives-display">
      <span class="hud-lives-count" id="hud-lives-count">3</span>
      <span class="hud-lives-label">Lives</span>
    </div>
  </div>
  <div class="hud-item">
    <span class="hud-label">Pesos</span>
    <div class="hud-pesos-wrapper">
      <img src="coin.png" alt="" class="hud-pesos-icon" id="hud-coin-img" onerror="this.style.display='none'">
      <span class="hud-value pesos" id="hud-pesos">0</span>
    </div>
  </div>
</div>

<div id="powerup-container" class="hidden">
  <button class="powerup-btn" id="btn-use-timestop" title="Use Time Stop (Spacebar)">
    <img src="hourglass.png" alt="⏳" id="powerup-icon-img">
    <span class="powerup-count" id="powerup-hud-count">0</span>
  </button>
</div>

<canvas id="game"></canvas>
<div id="combo-popup"></div>

<div class="screen" id="screen-menu">
  <div class="menu-title">Drop<br><span class="accent">Catch</span> 💧</div>
  <div class="menu-sub">Catch falling water drops to earn <strong style="color:#ffd700">pesos</strong>. Don't miss 3!</div>
  <div class="menu-pesos-badge">
    <img src="coin.png" alt="peso" onerror="this.style.display='none'">
    <span id="menu-pesos-count">0</span>

  </div>
  <button class="btn-primary" id="btn-play">Play</button>
  <button class="btn-shop" id="btn-open-shop" title="Open Shop">

  </button>
  <div class="drops-tip">Swipe left/right or use Arrow Keys to move.<br>Spacebar activates Time Freeze.</div>
  <div class="credit">
    <span class="credit-text">Made by</span>
    <span class="letter-o">O</span>
    <span class="credit-amp">&amp;</span>
    <span class="letter-s">S</span>
  </div>
</div>

<div class="screen hidden" id="screen-gameover">
  <div class="gameover-title">Game Over 💀</div>
  <div class="gameover-sub" id="gameover-sub">You gave it your all!</div>
  <div class="stat-row">
    <div class="stat-box">
      <span class="stat-box-label">Score</span>
      <span class="stat-box-value" id="end-score">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-box-label">Pesos</span>
      <div class="stat-box-icon">
        <img src="coin.png" alt="" style="width:22px;height:22px;object-fit:contain" onerror="this.style.display='none'">
        <span class="stat-box-value gold" id="end-pesos">0</span>
      </div>
    </div>
  </div>
  <button class="btn-primary" id="btn-play-again">Play Again</button>
  <button class="btn-secondary" id="btn-goto-menu">Main Menu</button>
  <div class="credit" style="margin-top:24px">
    <span class="credit-text">Made by</span>
    <span class="letter-o">O</span>
    <span class="credit-amp">&amp;</span>
    <span class="letter-s">S</span>
  </div>
</div>

<div class="screen hidden" id="screen-shop">
  <div class="shop-header">
    <div class="shop-title">🛒 Shop</div>
    <div class="shop-balance">
      <img src="coin.png" alt="peso" onerror="this.style.display='none'">
      <span id="shop-pesos-count">0</span>
    </div>
  </div>
  <div class="shop-bg">
    <img class="shop-bg-img" src="shop.png" alt="" onerror="this.style.display='none'">
    <div class="shop-items" id="shop-items"></div>
  </div>
  <button class="btn-secondary" id="btn-close-shop" style="margin-top:0">← Back</button>
</div>

<script>
/* ════════════════════════════════════════════
   SAVE SYSTEM
   ════════════════════════════════════════════ */
const SAVE_KEY = 'dropcatch_save';
const isCrazyGames = window.location.hostname.includes('crazygames.com')
  || typeof window.CrazyGames !== 'undefined'
  || (typeof window.SDK !== 'undefined' && window.SDK?.data);
let cgSDK = null;

async function cgInit() {
  if (!isCrazyGames) return;
  try {
    if (typeof window.CrazyGames !== 'undefined' && window.CrazyGames.SDK) {
      cgSDK = window.CrazyGames.SDK;
      await cgSDK.init();
    }
  } catch(e) { cgSDK = null; }
}

async function saveProgress(data) {
  const payload = JSON.stringify(data);
  if (cgSDK) {
    try { await cgSDK.data.setItem(SAVE_KEY, payload); return; } catch(e) {}
  }
  try { localStorage.setItem(SAVE_KEY, payload); } catch(e) {}
}

async function loadProgress() {
  if (cgSDK) {
    try {
      const v = await cgSDK.data.getItem(SAVE_KEY);
      if (v) return JSON.parse(v);
    } catch(e) {}
  }
  try {
    const v = localStorage.getItem(SAVE_KEY);
    if (v) return JSON.parse(v);
  } catch(e) {}
  return null;
}

/* ════════════════════════════════════════════
   AUDIO SYSTEM (Zero-Delay Processing)
   ════════════════════════════════════════════ */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioBuffer = null;

async function preloadAudio() {
  try {
    const response = await fetch('timestop.mp3');
    const arrayBuffer = await response.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  } catch (e) {
    console.log("Audio fallback mode operational.");
  }
}

function playTimeStopAudio() {
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  if (audioBuffer) {
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioCtx.destination);
    source.start(0);
    return;
  }
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(146.83, audioCtx.currentTime + 0.35);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  } catch(e){}
}

/* ════════════════════════════════════════════
   GAME STATE & VOLATILE TRACKERS
   ════════════════════════════════════════════ */
let persist = { 
  totalPesos: 0, 
  purchases: [],
  timestopCount: 0,
  timestopLevel: 0
};

let lives = 3, MAX_LIVES = 3, score = 0, sessionPesos = 0, combo = 0;
let dropInterval = 1400, dropTimer = 0, dropSpeed = 3.5, speedTick = 0, waterLevel = 0;
let gameRunning = false, animFrame, lastTime = 0;

let timeStopActive = false;
let timeStopTimeRemaining = 0;
let postTimeStopSlowTimer = 0;

/* ════════════════════════════════════════════
   CANVAS & OBJECT DEFS (DYNAMIC FROM CONFIG)
   ════════════════════════════════════════════ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

// Read Initial Bucket structural elements from external configuration profiles
let bucket = { 
  x: 0, 
  y: 0, 
  w: 0, 
  h: GAME_CONFIG.bucket.height, 
  targetX: 0 
};
let drops = [], particles = [];

const textures = {};
function loadImg(key, src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => { textures[key] = img; resolve(img); };
    img.onerror = () => { textures[key] = null; resolve(null); };
    img.src = src;
  });
}

/* ════════════════════════════════════════════
   RESIZE & HUD INTERACTION RENDERERS
   ════════════════════════════════════════════ */
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  
  // Apply external bucket scalar configuration properties
  bucket.w = W * GAME_CONFIG.bucket.widthRatio;
  bucket.h = GAME_CONFIG.bucket.height;
  bucket.y = H - GAME_CONFIG.bucket.bottomOffset;
  
  if (!gameRunning) {
    bucket.x = W / 2 - bucket.w / 2;
    bucket.targetX = bucket.x;
  }
}
window.addEventListener('resize', resize);

const hudScore = document.getElementById('hud-score');
const hudPesos = document.getElementById('hud-pesos');
const hudLivesCount = document.getElementById('hud-lives-count');
const powerupHUDCount = document.getElementById('powerup-hud-count');
const usePowerupBtn = document.getElementById('btn-use-timestop');

function updateHUD() {
  hudScore.textContent = score;
  hudPesos.textContent = sessionPesos;
  hudLivesCount.textContent = lives;
  powerupHUDCount.textContent = persist.timestopCount;
  if(persist.timestopCount <= 0) {
    usePowerupBtn.classList.add('disabled');
  } else {
    usePowerupBtn.classList.remove('disabled');
  }
}

/* ════════════════════════════════════════════
   POWERUP CHANNELS
   ════════════════════════════════════════════ */
function triggerTimeStop() {
  if (!gameRunning || timeStopActive || persist.timestopCount <= 0) return;
  persist.timestopCount--;
  timeStopActive = true;
  postTimeStopSlowTimer = 0; 
  
  timeStopTimeRemaining = GAME_CONFIG.powerups.timeStopFreezeDuration;
  
  playTimeStopAudio();
  usePowerupBtn.classList.add('active-pulse');
  updateHUD();
  saveProgress(persist);
}

/* ════════════════════════════════════════════
   DYNAMIC DROPS INJECTION
   ════════════════════════════════════════════ */
function spawnDrop() {
  const rMin = GAME_CONFIG.drops.radiusMin;
  const rMax = GAME_CONFIG.drops.radiusMax;
  const scatter = GAME_CONFIG.drops.scatterVariance;
  
  drops.push({
    x: Math.random() * (W - 32) + 16,
    y: -30,
    r: rMin + Math.random() * (rMax - rMin),
    speed: dropSpeed + Math.random() * 1.5,
    wobble: Math.random() * Math.PI * 2,
    scatterOffset: (Math.random() - 0.5) * scatter
  });
}

function drawDrop(d) {
  ctx.save();
  const {x, y, r} = d;
  
  ctx.beginPath();
  ctx.moveTo(x, y - r * 1.6);
  ctx.bezierCurveTo(x + r * 0.6, y - r * 0.6, x + r, y + r * 0.4, x, y + r);
  ctx.bezierCurveTo(x - r, y + r * 0.4, x - r * 0.6, y - r * 0.6, x, y - r * 1.6);
  ctx.closePath();
  
  const g = ctx.createLinearGradient(x - r, y - r, x + r, y + r);
  if (timeStopActive) {
    g.addColorStop(0, '#93c5fd');
    g.addColorStop(1, '#1e3a8a');
  } else {
    g.addColorStop(0, 'rgba(180,230,255,0.95)');
    g.addColorStop(0.45, 'rgba(79,195,247,0.92)');
    g.addColorStop(1, 'rgba(2,136,209,0.88)');
  }
  
  ctx.fillStyle = g;
  ctx.fill();
  
  ctx.beginPath();
  ctx.ellipse(x - r * 0.28, y - r * 0.5, r * 0.22, r * 0.36, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fill();
  ctx.restore();
}

/* ════════════════════════════════════════════
   BUCKET & SCALED FLOOR SHADOW RENDERERS
   ════════════════════════════════════════════ */
function drawBucket() {
  const {x: bx, y: by, w: bw, h: bh} = bucket;
  ctx.save();

  // DYNAMIC: Base floor shadow properties scaling proportionally alongside config inputs
  ctx.beginPath();
  ctx.ellipse(bx + bw / 2, by + bh + 4, bw * 0.46, bh * 0.062, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();

  if (textures.bucket) {
    ctx.drawImage(textures.bucket, bx, by, bw, bh);
  } else {
    ctx.beginPath();
    ctx.moveTo(bx - 4, by);
    ctx.lineTo(bx + bw + 4, by);
    ctx.lineTo(bx + bw - 6, by + bh);
    ctx.lineTo(bx + 6, by + bh);
    ctx.closePath();
    const bg = ctx.createLinearGradient(bx, by, bx + bw, by);
    bg.addColorStop(0, '#3b82f6'); 
    bg.addColorStop(0.5, '#60a5fa'); 
    bg.addColorStop(1, '#1d4ed8');
    ctx.fillStyle = bg; ctx.fill();
  }
  ctx.restore();
}

/* ════════════════════════════════════════════
   DYNAMIC FLUID PARTICLE INJECTORS
   ════════════════════════════════════════════ */
function spawnCatchParticles(x, y) {
  const qty = GAME_CONFIG.particles.catchCount;
  for (let i = 0; i < qty; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
    const velocity = 0.5 + Math.random() * 1.5;
    particles.push({
      x, y, 
      vx: Math.cos(angle) * velocity, 
      vy: Math.sin(angle) * velocity,
      life: 0.8, 
      decay: 0.04, 
      r: 1.5 + Math.random() * 2.0, 
      type: 'catch'
    });
  }
}

function spawnEdgeExplosionParticles(x, y) {
  const qty = GAME_CONFIG.particles.edgeExplosionCount;
  for (let i = 0; i < qty; i++) {
    const angle = (Math.random() * -Math.PI); 
    const velocity = 2.5 + Math.random() * 4.5;
    particles.push({
      x, y, 
      vx: Math.cos(angle) * velocity, 
      vy: Math.sin(angle) * velocity - 1,
      life: 1.0, 
      decay: 0.03 + Math.random() * 0.02, 
      r: 2 + Math.random() * 3, 
      type: 'edge'
    });
  }
}

function spawnMissParticles(x) {
  const qty = GAME_CONFIG.particles.missCount;
  for (let i = 0; i < qty; i++) {
    particles.push({
      x, y: H - 20, 
      vx: (Math.random() - 0.5) * 4, 
      vy: -(Math.random() * 3 + 1),
      life: 1, 
      decay: 0.05 + Math.random() * 0.04, 
      r: 2 + Math.random() * 3, 
      type: 'miss'
    });
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save(); 
    ctx.globalAlpha = Math.max(0, p.life);
    
    // Assign structural color properties from external config file declarations
    if (p.type === 'catch' || p.type === 'edge') {
      ctx.fillStyle = GAME_CONFIG.particles.catchColor + p.life + ")";
    } else {
      ctx.fillStyle = GAME_CONFIG.particles.missColor + p.life + ")";
    }
    
    ctx.beginPath(); 
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); 
    ctx.fill(); 
    ctx.restore();
  }
}

/* ════════════════════════════════════════════
   BACKGROUND SCENERY
   ════════════════════════════════════════════ */
function drawBg() {
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(100,180,255,0.04)'; ctx.lineWidth = 1;
  for (let y = 80; y < H; y += 64) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

const comboPopup = document.getElementById('combo-popup');
let comboTimer = null;
function showCombo(n) {
  if (n < 3) return;
  const m = n >= 20 ? 'UNSTOPPABLE 🔥🔥' : n >= 10 ? '10x Streak! 🔥' : n >= 5 ? '5x Combo!' : '3x Combo!';
  comboPopup.textContent = m;
  comboPopup.style.opacity = '1';
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { comboPopup.style.opacity = '0'; }, 1200);
}

/* ════════════════════════════════════════════
   ENGINE CORE LOOPS & COLLISION EQUATIONS
   ════════════════════════════════════════════ */
function update(dt) {
  if (!gameRunning) return;

  if (timeStopActive) {
    timeStopTimeRemaining -= dt;
    if (timeStopTimeRemaining <= 0) {
      timeStopActive = false;
      usePowerupBtn.classList.remove('active-pulse');
      
      let baseSlowWindow = 5000;
      if (persist.timestopLevel > 0) {
        baseSlowWindow = GAME_CONFIG.upgradeTiers[persist.timestopLevel - 1].slowDuration;
      }
      postTimeStopSlowTimer = baseSlowWindow; 
    }
  } else if (postTimeStopSlowTimer > 0) {
    postTimeStopSlowTimer -= dt;
  }

  dropTimer += dt; speedTick += dt;
  if (speedTick > GAME_CONFIG.drops.difficultyTimeStep) {
    speedTick = 0;
    dropSpeed = Math.min(dropSpeed + GAME_CONFIG.drops.difficultyDifficultyStep, GAME_CONFIG.drops.maxSpeed);
    dropInterval = Math.max(dropInterval - GAME_CONFIG.drops.intervalDifficultyStep, GAME_CONFIG.drops.minInterval);
  }
  if (dropTimer > dropInterval) {
    dropTimer = 0; spawnDrop();
    if (dropSpeed > 6 && Math.random() < 0.3) spawnDrop();
  }

  // Handle slide translations via config movement constants
  bucket.x += (bucket.targetX - bucket.x) * GAME_CONFIG.bucket.movementLerp;

  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    
    let currentDropSpeed = d.speed;
    if (timeStopActive) {
      currentDropSpeed = 0.0; 
    } else if (postTimeStopSlowTimer > 0) {
      currentDropSpeed = d.speed * 0.20; 
    } else {
      currentDropSpeed += d.scatterOffset; // Apply layout scatter offset profiles to prevent stack clumping
    }
    
    d.y += currentDropSpeed * (dt / 16);
    
    // READ CRITICAL DETAILED HITBOX SEGMENTS FROM DYNAMIC PROPERTIES CONFIG
    const bL = bucket.x;
    const bR = bucket.x + bucket.w;
    const bT = bucket.y;
    
    if (d.y + d.r >= bT && d.y - d.r <= bT + bucket.h) {
      if (d.x >= bL && d.x <= bR) {
        
        // Compute precise pixel ranges for corner edge zones
        const edgeWidthPixels = bucket.w * GAME_CONFIG.physics.edgeWidthPercent;
        const isLeftCorner = (d.x >= bL && d.x <= bL + edgeWidthPixels);
        const isRightCorner = (d.x >= bR - edgeWidthPixels && d.x <= bR);
        
        if ((isLeftCorner || isRightCorner) && d.y <= bT + GAME_CONFIG.physics.edgeHeightThreshold) {
          // Trigger corner break split explosion paths
          spawnEdgeExplosionParticles(d.x, bT);
          score++; sessionPesos += 5; combo++;
          updateHUD(); showCombo(combo);
          drops.splice(i, 1); continue;
        }
        
        // Internal basin catch checks
        const topLimit = GAME_CONFIG.physics.catchTopThreshold;
        const bottomLimit = GAME_CONFIG.physics.catchBottomThreshold;
        if (d.y >= bT + topLimit && d.y - d.r < bT + bottomLimit) {
          spawnCatchParticles(d.x, d.y);
          score++; sessionPesos += 5; combo++;
          waterLevel = Math.min(waterLevel + 0.06, 0.7);
          updateHUD(); showCombo(combo);
          drops.splice(i, 1); continue;
        }
      }
    }
    
    if (d.y > H + 20) {
      spawnMissParticles(d.x);
      lives--; combo = 0; updateHUD();
      drops.splice(i, 1);
      if (lives <= 0) endGame();
    }
  }
  
  waterLevel = Math.max(0, waterLevel - 0.0002 * dt);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  drawBg();
  for (const d of drops) drawDrop(d);
  if (timeStopActive) {
    ctx.fillStyle = "rgba(147, 197, 253, 0.12)";
    ctx.fillRect(0, 0, W, H);
  }
  drawBucket();
  drawParticles();
}

function loop(ts) {
  const dt = Math.min(ts - lastTime, 50); lastTime = ts;
  update(dt); draw();
  if (gameRunning) animFrame = requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════
   SCREENS NAVIGATION HANDLERS
   ════════════════════════════════════════════ */
const screens = {
  menu: document.getElementById('screen-menu'),
  gameover: document.getElementById('screen-gameover'),
  shop: document.getElementById('screen-shop'),
};

function showScreen(name) {
  Object.entries(screens).forEach(([k, el]) => el.classList.toggle('hidden', k !== name));
  if (name === null) {
    document.getElementById('powerup-container').classList.remove('hidden');
  } else {
    document.getElementById('powerup-container').classList.add('hidden');
  }
}

function showMainMenu() {
  document.getElementById('menu-pesos-count').textContent = persist.totalPesos;
  showScreen('menu');
}

function startGame() {
  drops = []; particles = [];
  score = 0; sessionPesos = 0; combo = 0;
  dropInterval = GAME_CONFIG.drops.baseInterval; 
  dropTimer = 0; 
  dropSpeed = GAME_CONFIG.drops.baseSpeed; 
  speedTick = 0; waterLevel = 0;
  postTimeStopSlowTimer = 0;
  MAX_LIVES = persist.purchases.includes('bucket_upgrade') ? 5 : 3;
  lives = MAX_LIVES;
  timeStopActive = false;
  timeStopTimeRemaining = 0;
  usePowerupBtn.classList.remove('active-pulse');
  
  bucket.x = W / 2 - bucket.w / 2; bucket.targetX = bucket.x;
  updateHUD(); 
  showScreen(null);
  gameRunning = true; lastTime = performance.now();
  animFrame = requestAnimationFrame(loop);
}

async function endGame() {
  gameRunning = false; cancelAnimationFrame(animFrame);
  persist.totalPesos += sessionPesos;
  await saveProgress(persist);
  document.getElementById('end-score').textContent = score;
  document.getElementById('end-pesos').textContent = sessionPesos;
  document.getElementById('gameover-sub').innerHTML =
    `You caught <strong style="color:#4fc3f7">${score} drops</strong> and earned <strong style="color:#ffd700">${sessionPesos} pesos</strong>!`;
  showScreen('gameover');
}

/* ════════════════════════════════════════════
   SHOP SUBSYSTEMS (DRIVEN BY CONFIG PROPERTIES)
   ════════════════════════════════════════════ */
function renderShop() {
  document.getElementById('shop-pesos-count').textContent = persist.totalPesos;
  const container = document.getElementById('shop-items');
  container.innerHTML = '';

  // Frame 1: Upgraded Bucket Item Node
  const bucketOwned = persist.purchases.includes('bucket_upgrade');
  const bCost = GAME_CONFIG.powerups.reinforcedRimPrice;
  const canAffordBucket = persist.totalPesos >= bCost;
  const elBucket = document.createElement('div');
  elBucket.className = 'shop-item' + (bucketOwned ? ' owned' : '');
  elBucket.innerHTML = `
    <div class="shop-item-icon"><img src="bucket.png" alt="bucket" onerror="this.style.display='none'"></div>
    <div class="shop-item-info">
      ${bucketOwned ? '<span class="upgrade-badge">✓ Owned</span>' : `<span class="upgrade-badge" style="color:rgba(160,210,255,0.7);border-color:rgba(100,180,255,0.25);background:rgba(79,195,247,0.08)">Cost</span>`}
      <div class="shop-item-name">Hydra Bucket</div>
      <div class="shop-item-desc">Reinforced visual perimeter armor - upgrades capacity limits to 5 maximum lives.</div>
    </div>
    <div class="shop-item-action">
      ${bucketOwned ? `<div class="btn-owned">✓ Owned</div>` : canAffordBucket ?
        `<button class="btn-buy" id="buy-bucket-btn"><img src="coin.png" alt="" onerror="this.style.display='none'"> ${bCost}</button>` :
        `<button class="btn-buy cant-afford" disabled><img src="coin.png" alt="" onerror="this.style.display='none'"> ${bCost}</button>`
      }
    </div>
  `;
  container.appendChild(elBucket);
  
  if (document.getElementById('buy-bucket-btn')) {
    document.getElementById('buy-bucket-btn').addEventListener('click', async () => {
      if (persist.totalPesos >= bCost) {
        persist.totalPesos -= bCost;
        persist.purchases.push('bucket_upgrade');
        await saveProgress(persist);
        renderShop();
      }
    });
  }

  // Frame 2: Consumable Power-up Stock Node
  const tsCost = GAME_CONFIG.powerups.basePrice;
  const maxStock = GAME_CONFIG.powerups.maxConsumableStock;
  const canAffordTS = persist.totalPesos >= tsCost;
  const atMaxCount = persist.timestopCount >= maxStock;
  const elTimeStop = document.createElement('div');
  elTimeStop.className = 'shop-item';
  elTimeStop.innerHTML = `
    <div class="shop-item-icon"><img src="hourglass.png" alt="⏳" onerror="this.style.display='none'"></div>
    <div class="shop-item-info">
      <span class="upgrade-badge" style="color:#ff9800;border-color:rgba(255,152,0,0.4);background:rgba(255,152,0,0.08)">Stock: ${persist.timestopCount}/${maxStock}</span>
      <div class="shop-item-name">Chronos Freeze</div>
      <div class="shop-item-desc">Completely locks all active liquid nodes stationary in mid-air for 2 seconds.</div>
    </div>
    <div class="shop-item-action">
      ${atMaxCount ? `<div class="btn-owned" style="color:#ff9800; border-color:rgba(255,152,0,0.3)">MAX</div>` : canAffordTS ?
        `<button class="btn-buy" id="buy-ts-btn"><img src="coin.png" alt=""> ${tsCost}</button>` :
        `<button class="btn-buy cant-afford" disabled><img src="coin.png" alt=""> ${tsCost}</button>`
      }
    </div>
  `;
  container.appendChild(elTimeStop);

  if (document.getElementById('buy-ts-btn')) {
    document.getElementById('buy-ts-btn').addEventListener('click', async () => {
      if (persist.totalPesos >= tsCost && persist.timestopCount < maxStock) {
        persist.totalPesos -= tsCost;
        persist.timestopCount++;
        await saveProgress(persist);
        renderShop();
      }
    });
  }

  // Frame 3: Linear Progression Upgrades Tiers Node
  const currentTierIndex = persist.timestopLevel;
  const maxTierReached = currentTierIndex >= GAME_CONFIG.upgradeTiers.length;
  const nextUpgrade = !maxTierReached ? GAME_CONFIG.upgradeTiers[currentTierIndex] : null;
  const canAffordUpgrade = nextUpgrade ? persist.totalPesos >= nextUpgrade.cost : false;

  const elTSUpgrade = document.createElement('div');
  elTSUpgrade.className = 'shop-item' + (maxTierReached ? ' owned' : '');
  elTSUpgrade.innerHTML = `
    <div class="shop-item-icon" style="background:rgba(255,215,0,0.05); border-color:rgba(255,215,0,0.2)">
      <img src="hourglass.png" alt="⚡" style="filter:hue-rotate(165deg)" onerror="this.style.display='none'">
    </div>
    <div class="shop-item-info">
      <span class="upgrade-badge">LVL ${currentTierIndex}</span>
      <div class="shop-item-name">Hydra Cooldown</div>
      <div class="shop-item-desc">${maxTierReached ? 'Maximum capability unlock reached!' : nextUpgrade.desc}</div>
    </div>
    <div class="shop-item-action">
      ${maxTierReached ? `<div class="btn-owned">ELITE</div>` : canAffordUpgrade ?
        `<button class="btn-buy" id="buy-ts-up-btn"><img src="coin.png" alt=""> ${nextUpgrade.cost}</button>` :
        `<button class="btn-buy cant-afford" disabled><img src="coin.png" alt=""> ${nextUpgrade.cost}</button>`
      }
    </div>
  `;
  container.appendChild(elTSUpgrade);

  if (document.getElementById('buy-ts-up-btn') && nextUpgrade) {
    document.getElementById('buy-ts-up-btn').addEventListener('click', async () => {
      if (persist.totalPesos >= nextUpgrade.cost) {
        persist.totalPesos -= nextUpgrade.cost;
        persist.timestopLevel++;
        await saveProgress(persist);
        renderShop();
      }
    });
  }
}

/* ════════════════════════════════════════════
   USER INPUT EVENT SYSTEM
   ════════════════════════════════════════════ */
document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-play-again').addEventListener('click', startGame);
document.getElementById('btn-goto-menu').addEventListener('click', showMainMenu);
document.getElementById('btn-open-shop').addEventListener('click', () => {
  renderShop(); showScreen('shop');
});
document.getElementById('btn-close-shop').addEventListener('click', showMainMenu);

usePowerupBtn.addEventListener('click', (e) => {
  e.stopPropagation(); triggerTimeStop();
});

let lastTouchX = null;
canvas.addEventListener('touchstart', e => { e.preventDefault(); lastTouchX = e.touches[0].clientX; }, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault(); if (!gameRunning) return;
  const tx = e.touches[0].clientX, dx = tx - lastTouchX; lastTouchX = tx;
  const sens = GAME_CONFIG.bucket.touchSpeedScale;
  bucket.targetX = Math.max(0, Math.min(W - bucket.w, bucket.targetX + dx * sens));
}, {passive: false});

canvas.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  bucket.targetX = Math.max(0, Math.min(W - bucket.w, e.clientX - bucket.w / 2));
});

window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  const stepSize = W * GAME_CONFIG.bucket.keyboardStepRatio;
  if (e.key === 'ArrowLeft') bucket.targetX = Math.max(0, bucket.targetX - stepSize);
  if (e.key === 'ArrowRight') bucket.targetX = Math.min(W - bucket.w, bucket.targetX + stepSize);
  if (e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault(); triggerTimeStop();
  }
});

/* ════════════════════════════════════════════
   INITIALIZATION BOOTSTRAP
   ════════════════════════════════════════════ */
(async () => {
  await cgInit();
  await preloadAudio();
  const saved = await loadProgress();
  if (saved) {
    persist.totalPesos = saved.totalPesos || 0;
    persist.purchases = saved.purchases || [];
    persist.timestopCount = saved.timestopCount || 0;
    persist.timestopLevel = saved.timestopLevel || 0;
  }
  await Promise.all([
    loadImg('bucket', 'bucket.png'),
    loadImg('coin', 'coin.png'),
    loadImg('shop', 'shop.png'),
    loadImg('hourglass', 'hourglass.png')
  ]);
  resize();
  draw();
  showMainMenu();
})();
</script>
